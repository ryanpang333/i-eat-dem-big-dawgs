<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Paw Finder</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a class="logo" href="index.html">🐾 Paw Finder</a>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="browse.html">Browse</a></li>
    <li><a href="tips.html">Tips</a></li>
  </ul>
  <div class="nav-user" id="nav-user"></div>
</nav>

<div class="login-page">
  <div class="login-box">
    <div style="font-size:3rem;margin-bottom:8px;">🐾</div>
    <h1>Welcome Back!</h1>
    <p>Sign in with your Google account to post a lost or found pet.</p>

    <button class="google-btn" onclick="loginWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Sign in with Google
    </button>

    <div class="login-divider">or</div>

    <button class="demo-btn" onclick="demoLogin()">
      🎓 Demo Login (for class)
    </button>

    <p class="login-note" id="login-status">
      Connect Supabase to enable real Google login.<br>
      Use <strong>Demo Login</strong> to test the site right now.
    </p>
  </div>
</div>

<footer>
  <p>© 2026 Paw Finder — Made by Ryan | <a href="contact.html" style="color:#a855f7;">Contact Us</a></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-config.js"></script>
<script src="js/app.js"></script>
<script>
  if (DB_READY) {
    document.getElementById('login-status').innerHTML =
      '✅ Supabase connected — Google login is ready!';
    document.getElementById('login-status').style.color = '#a855f7';
  }
</script>
</body>
</html>
