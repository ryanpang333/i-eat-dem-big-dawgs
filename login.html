<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Paw Finder</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <a class="logo" href="index.html">🐾 Paw Finder</a>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="browse.html">Browse</a></li>
    <li><a href="tips.html">Tips</a></li>
  </ul>
  <div class="nav-user" id="nav-user"></div>
</nav>

<div class="login-page">
  <div class="login-box">
    <div style="font-size:3rem;margin-bottom:8px;">🐾</div>
    <h1>Welcome Back!</h1>
    <p>Sign in with your Google account to post a lost or found pet.</p>

    <!-- Real Google Sign-In button (needs a Client ID to appear) -->
    <div id="g_id_onload"
         data-client_id="YOUR_GOOGLE_CLIENT_ID"
         data-callback="handleGoogleLogin"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-theme="outline"
         data-text="signin_with"
         data-shape="rectangular"
         data-logo_alignment="left"
         data-width="328">
    </div>

    <div class="login-divider">or</div>

    <!-- Demo mode button — works without a Client ID -->
    <button class="demo-btn" onclick="demoLogin()">
      🎓 Demo Login (for class)
    </button>

    <p class="login-note">
      The "Sign in with Google" button requires a free Google Cloud Client ID.<br>
      Use <strong>Demo Login</strong> to test the site right now.
    </p>
  </div>
</div>

<footer>
  <p>© 2026 Paw Finder — Made by Ryan | <a href="contact.html" style="color:#ffb300;">Contact Us</a></p>
</footer>

<!-- Load Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async></script>
<script src="js/app.js"></script>
</body>
</html>
